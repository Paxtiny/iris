<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nicodAImus iris</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="iris-popup" class="iris-popup">
    <div class="iris-popup-header">
      <div class="iris-popup-header-left">
        <img src="icons/nicod-mark.png" class="iris-logo-mark" alt="nicodAImus">
        <span class="iris-logo">iris</span>
      </div>
      <a class="iris-brand" href="https://nicodaimus.com?utm_source=iris&utm_medium=extension" target="_blank" rel="noopener noreferrer">by nicodAImus</a>
    </div>
    <div id="iris-tab-banner" class="iris-tab-banner" style="display:none;"></div>
    <div id="iris-popup-content" class="iris-popup-body">
      <p class="iris-popup-hint">Open an email in Gmail or Proton Mail, then click Scan.</p>
      <button id="iris-check-btn" class="iris-btn">Scan</button>
    </div>
    <div id="iris-email-meta" class="iris-email-meta" style="display:none;"></div>
    <div id="iris-popup-result" class="iris-popup-result" style="display:none;"></div>
    <footer class="iris-panel-footer">Best-effort analysis only - not a security guarantee.</footer>
    <div class="iris-panel-footer-links">
      <a class="iris-footer-link" href="https://nicodaimus.com/datenschutz.html?utm_source=iris&utm_medium=extension#iris-privacy" target="_blank" rel="noopener noreferrer">Privacy</a>
      <span class="iris-link-sep">&middot;</span>
      <a class="iris-footer-link" href="https://nicodaimus.com/terms.html?utm_source=iris&utm_medium=extension" target="_blank" rel="noopener noreferrer">Terms</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
