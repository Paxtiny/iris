<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nicodAImus iris</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="iris-popup" class="iris-popup">
    <div class="iris-popup-header">
      <span class="iris-logo">iris</span>
      <span class="iris-brand">by nicodAImus</span>
    </div>
    <div id="iris-popup-content" class="iris-popup-body">
      <p class="iris-popup-hint">Open an email in Gmail, then click here to check it.</p>
      <button id="iris-check-btn" class="iris-btn">Check Current Email</button>
    </div>
    <div id="iris-popup-result" class="iris-popup-result" style="display:none;"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
